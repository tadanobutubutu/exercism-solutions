name: Auto Merge Exercism Bot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Force Merge Exercism-bot PRs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // 古い順にオープンなPRを取得する
            const pulls = (await github.rest.pulls.list({ 
              owner, 
              repo, 
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 100
            })).data;
            
            console.log(`🔍 Found ${pulls.length} open pull requests.`);
            
            for (const pr of pulls) {
              const creator = pr.user.login;
              
              // ExercismのBot以外のPRはCloseする
              if (creator !== 'exercism-solutions-syncer[bot]') {
                console.log(`⚠️ PR #${pr.number} was created by ${creator} (not the authorized bot). Closing...`);
                try {
                  await github.rest.pulls.update({
                    owner,
                    repo,
                    pull_number: pr.number,
                    state: 'closed'
                  });
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: 'This repository only accepts automated PRs from the Exercism solution syncer bot. Closing this PR.'
                  });
                  console.log(`🔒 Closed PR #${pr.number}`);
                } catch (err) {
                  console.log(`❌ Failed to close PR #${pr.number}: ${err.message}`);
                }
                continue;
              }
              
              console.log(`🚀 Processing PR #${pr.number}: ${pr.title}`);
              
              // 1. ドラフト解除が必要なら実行 (GraphQL)
              if (pr.draft) {
                console.log(`📝 PR #${pr.number} is draft, converting...`);
                try {
                  await github.graphql(`mutation { markPullRequestReadyForReview(input: {pullRequestId: "${pr.node_id}"}) { clientMutationId } }`);
                  await new Promise(r => setTimeout(r, 2000));
                } catch (err) {
                  console.log(`⚠️ Failed to mark ready for review: ${err.message}`);
                }
              }

              // 2. マージ試行
              try {
                await github.rest.pulls.merge({ 
                  owner, repo, 
                  pull_number: pr.number, 
                  merge_method: 'squash' 
                });
                console.log(`✅ Merged PR #${pr.number}`);
                await new Promise(r => setTimeout(r, 3000));
              } catch (e) {
                console.log(`⚠️ Standard merge failed: ${e.message}. Trying GraphQL force merge...`);
                try {
                  await github.graphql(`mutation { mergePullRequest(input: { pullRequestId: "${pr.node_id}", mergeMethod: SQUASH }) { clientMutationId } }`);
                  console.log(`✅ Force merged PR #${pr.number}`);
                  await new Promise(r => setTimeout(r, 3000));
                } catch (err) {
                  console.log(`❌ Failed to merge PR #${pr.number}: ${err.message}`);
                }
              }
            }

